version: '3.8'

services:
  app:
    build: .
    container_name: microblog_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://db:27017
      - DB_NAME=microblog
      - JWT_SECRET=Zj9Fg4gKYU6LE8OX
      - PORT=3000
    depends_on:
      - db

  db:
    image: mongo:6.0
    container_name: microblog_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
